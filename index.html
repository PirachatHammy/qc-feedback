<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QC Feedback System</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Kanit',sans-serif;background:#f0f4ff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(99,102,241,0.12) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 90% 100%,rgba(6,182,212,0.10) 0%,transparent 60%);pointer-events:none;}
.blob{position:fixed;border-radius:50%;filter:blur(60px);opacity:.32;pointer-events:none;animation:bf 8s ease-in-out infinite;}
.b1{width:320px;height:320px;background:radial-gradient(circle,#a5b4fc,#818cf8);top:-80px;left:-80px;}
.b2{width:260px;height:260px;background:radial-gradient(circle,#67e8f9,#22d3ee);bottom:-60px;right:-60px;animation-delay:-3s;}
@keyframes bf{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(20px,-20px) scale(1.05);}}
.wrap{position:relative;z-index:10;text-align:center;padding:24px;}
.logo{font-family:'Chakra Petch',monospace;font-size:11px;letter-spacing:.2em;color:#9194b8;text-transform:uppercase;margin-bottom:16px;}
h1{font-size:clamp(24px,5vw,36px);font-weight:800;color:#1e1b4b;margin-bottom:8px;}
.sub{font-size:14px;color:#6366a0;margin-bottom:40px;}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:480px;margin:0 auto;}
@media(max-width:480px){.cards{grid-template-columns:1fr;}}
.card{background:#fff;border:1.5px solid rgba(99,102,241,0.15);border-radius:20px;padding:28px 20px;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:12px;box-shadow:0 4px 24px rgba(99,102,241,0.10);transition:all .25s cubic-bezier(0.34,1.2,0.64,1);}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(99,102,241,0.2);}
.card.form{border-color:rgba(99,102,241,0.3);}
.card.dash{border-color:rgba(6,182,212,0.3);}
.card-icon{font-size:44px;line-height:1;}
.card-title{font-size:16px;font-weight:700;color:#1e1b4b;}
.card-sub{font-family:'Chakra Petch',monospace;font-size:10px;color:#9194b8;text-transform:uppercase;letter-spacing:.08em;}
.card.form .card-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;}
.card.dash .card-btn{background:linear-gradient(135deg,#06b6d4,#6366f1);color:#fff;}
.card-btn{margin-top:4px;padding:8px 20px;border-radius:999px;font-family:'Kanit',sans-serif;font-size:13px;font-weight:600;}
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="wrap">
  <div class="logo">⚙ QC System · Ajinomoto · PD-3</div>
  <h1>ระบบ Feedback</h1>
  <p class="sub">เลือกหน้าที่ต้องการใช้งาน</p>
  <div class="cards">
    <a href="feedback-form.html" class="card form">
      <span class="card-icon">📝</span>
      <div class="card-title">แบบประเมิน</div>
      <div class="card-sub">Feedback Form</div>
      <div class="card-btn">กรอกแบบประเมิน</div>
    </a>
    <a href="feedback-dashboard.html" class="card dash">
      <span class="card-icon">📊</span>
      <div class="card-title">Dashboard</div>
      <div class="card-sub">Results & Analytics</div>
      <div class="card-btn">ดูผลสรุป</div>
    </a>
  </div>
</div>
</body>
</html>
